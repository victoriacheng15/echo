header:
  project_name: "Echo"
  site_url: "https://victoriacheng15.github.io/echo" # Example URL

system_specification:
  objective: "Echo is an MCP (Model Context Protocol) server that acts as a persistent memory layer, providing AI agents with the ability to store and recall knowledge across sessions."
  stack: "Go (Golang), SQLite (FTS5/WAL), MCP (Model Context Protocol)"
  pattern: "MCP Server"
  entry_point: "cmd/mcp/main.go"
  persistence_strategy: "Local SQLite with automated FTS5 synchronization"
  observability: "TBD"
  machine_registry: "/api/evolution-registry.json"

hero:
  headline: "Persistent Memory for Intelligent AI Agents"
  sub_headline: "Echo is built with Go and SQLite and is a persistent memory for AI agents."
  brief_description: "Echo is an MCP (Model Context Protocol) server that acts as a persistent memory layer, providing AI agents with the ability to store and recall knowledge across sessions."
  cta_text: "Explore on GitHub"
  cta_link: "https://github.com/victoriacheng15/echo"
  secondary_cta_text: "See Evolution"
  secondary_cta_link: "evolution.html"

what_is_echo:
  title: "The Brains Behind the AI"
  content:
    - "Explain the concept of long-term memory for AI agents."
    - "Position Echo as a solution for agents to store, recall, and manage information across sessions, overcoming the limitations of stateless interactions."
    - "Highlight its role in enhancing AI capabilities by providing historical context and learned knowledge."

key_features:
  title: "Core Capabilities"
  features:
    - name: "Store Memory"
      description: "How AI agents save information (code snippets, instructions, observations) into Echo."
      icon: "💾"
    - name: "Recall Memory"
      description: "How agents retrieve specific past information based on queries."
      icon: "🧠"
    - name: "Search Memories"
      description: "Advanced contextual search using similarity (FTS5) to find relevant knowledge."
      icon: "🔍"
    - name: "Update Memory"
      description: "Surgical refinement of existing knowledge while preserving history."
      icon: "✏️"
    - name: "Delete Memory"
      description: "Management of outdated or irrelevant information."
      icon: "🗑️"

why_it_matters:
  title: "Driving Smarter, More Capable AI"
  points:
    - "Enhanced Context: AI agents maintain deep understanding over extended interactions."
    - "Continuous Learning: Knowledge gained is persistent, improving agent performance over time."
    - "Reliable Persistence: Leverages SQLite for persistent, local data storage."
    - "Developer Experience: Simple JSON-RPC interface for easy integration into agent architectures."
    - "Future-Proof: Designed to scale with evolving AI agent requirements."

