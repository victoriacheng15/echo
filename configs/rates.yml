# FinOps & GreenOps Rate Card (Canada-based)
# All rates are defined per unit.

# The value of human time (wait-time/thinking-time)
# Formula: $0.10 CAD per second = $0.0001 per millisecond
compute_cad_per_ms: 0.0001

# Operational Energy Cost (Canada Commercial/Industrial Average)
# Approx: $0.15 CAD per kWh = 0.000000042 CAD per joule
energy_cad_per_joule: 0.000000042

# Environmental Impact (Canada National Grid Intensity)
# Standard: 150g CO2e per kWh = 0.000042g per joule
carbon_g_per_joule: 0.000042

# --- Knowledge Refinement ---
# Minimum hit rate before context is considered "Low Signal"
target_hit_rate: 0.15

# Points to subtract from importance_score per cycle
decay_step: 1

# Minimum events required before a refinement cycle
refine_interval_events: 50
