{{ define "base" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Config.Header.ProjectName }} - {{ .Config.Hero.Headline }}</title>
    <meta name="description" content="{{ .Config.Hero.BriefDescription }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Config.Header.SiteUrl }}">
    <meta property="og:title" content="{{ .Config.Header.ProjectName }} - {{ .Config.Hero.Headline }}">
    <meta property="og:description" content="{{ .Config.Hero.BriefDescription }}">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ .Config.Header.SiteUrl }}">
    <meta property="twitter:title" content="{{ .Config.Header.ProjectName }} - {{ .Config.Hero.Headline }}">
    <meta property="twitter:description" content="{{ .Config.Hero.BriefDescription }}">

    <link rel="canonical" href="{{ .Config.Header.SiteUrl }}">

    <!-- Link to compiled Tailwind CSS -->
    <link href="styles.css" rel="stylesheet">
</head>

<body class="font-sans antialiased text-gray-50 bg-gray-900 w-[90%] max-w-4xl mx-auto min-h-screen flex flex-col">
    <div class="flex-grow flex flex-col">
        <!-- Header & Nav -->
        <header class="bg-transparent py-14 flex flex-col gap-y-16 w-full">
            <nav class="flex justify-between items-center border-b border-gray-800 pb-4">
                <a href="index.html" class="text-3xl font-bold hover:text-blue-400 transition duration-300">{{
                    .Config.Header.ProjectName }}</a>
                <ul class="flex gap-x-6">
                    <li><a href="evolution.html" class="text-lg hover:text-blue-400 transition duration-300">Evolution</a>
                    </li>
                </ul>
            </nav>

            {{ block "header" . }}{{ end }}
        </header>

        <!-- Main Content -->
        {{ block "content" . }}{{ end }}
    </div>

    <!-- Footer -->
    <footer
        class="bg-transparent border-t border-gray-800 py-8 flex flex-row items-center justify-center gap-x-8 w-full text-gray-400">
        <p>&copy; {{ .CurrentYear }} {{ .Config.Footer.Author }}</p>
        <div class="flex items-center gap-x-4">
            <a href="{{ .Config.Footer.GithubLink }}" class="hover:text-blue-400 transition duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-github">
                    <path
                        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                    </path>
                </svg>
                <span class="sr-only">GitHub</span>
            </a>
            <a href="{{ .Config.Footer.LinkedinLink }}" class="hover:text-blue-400 transition duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-linkedin">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                    <rect x="2" y="9" width="4" height="12"></rect>
                    <circle cx="4" cy="4" r="2"></circle>
                </svg>
                <span class="sr-only">LinkedIn</span>
            </a>
        </div>
    </footer>
</body>

</html>
{{ end }}
